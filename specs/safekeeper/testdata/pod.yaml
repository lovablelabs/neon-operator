apiVersion: v1
kind: Pod
metadata:
  creationTimestamp: null
  labels:
    molnett.org/cluster: test-cluster
    molnett.org/component: safekeeper
    molnett.org/safekeeper: test-safekeeper
  name: test-cluster-safekeeper-0
  namespace: neon
spec:
  containers:
  - args:
    - -c
    - /usr/local/bin/safekeeper --id=0 --broker-endpoint=http://test-cluster-storage-broker:50051
      --listen-pg=0.0.0.0:5454 --listen-http=0.0.0.0:7676 --advertise-pg=test-cluster-safekeeper-0:5454
      --datadir /data
    command:
    - /bin/bash
    env:
    - name: DEFAULT_PG_VERSION
      value: "15"
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    image: neondatabase/neon:8463
    name: safekeeper
    ports:
    - containerPort: 5454
    - containerPort: 7676
    resources: {}
    volumeMounts:
    - mountPath: /data
      name: safekeeper-storage
  securityContext:
    fsGroup: 1000
    runAsGroup: 1000
    runAsUser: 1000
  volumes:
  - name: safekeeper-storage
    persistentVolumeClaim:
      claimName: safekeeper-test-safekeeper-storage
status: {}
