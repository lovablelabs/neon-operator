apiVersion: v1
kind: Pod
metadata:
  creationTimestamp: null
  labels:
    molnett.org/cluster: test-cluster
    molnett.org/component: pageserver
    molnett.org/pageserver: test-pageserver
  name: test-cluster-pageserver-0
  namespace: neon
spec:
  containers:
  - command:
    - /usr/local/bin/pageserver
    env:
    - name: RUST_LOG
      value: debug
    - name: DEFAULT_PG_VERSION
      value: "16"
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          key: AWS_ACCESS_KEY_ID
          name: test-cluster-bucket-creds
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          key: AWS_SECRET_ACCESS_KEY
          name: test-cluster-bucket-creds
    - name: AWS_REGION
      valueFrom:
        secretKeyRef:
          key: AWS_REGION
          name: test-cluster-bucket-creds
    - name: BUCKET_NAME
      valueFrom:
        secretKeyRef:
          key: BUCKET_NAME
          name: test-cluster-bucket-creds
    - name: AWS_ENDPOINT_URL
      valueFrom:
        secretKeyRef:
          key: AWS_ENDPOINT_URL
          name: test-cluster-bucket-creds
    image: neondatabase/neon:8463
    imagePullPolicy: Always
    name: pageserver
    ports:
    - containerPort: 6400
    - containerPort: 9898
    resources: {}
    volumeMounts:
    - mountPath: /data/.neon/tenants
      name: pageserver-storage
    - mountPath: /data/.neon
      name: config
  initContainers:
  - args:
    - "\n# Use the pageserver ID directly\necho \"id=0\" > /config/identity.toml\n\n#
      Create metadata.json with proper host information using service DNS\necho \"{\\\"host\\\":\\\"test-cluster-pageserver-0.neon\\\",\"
      \\\n     \"\\\"http_host\\\":\\\"test-cluster-pageserver-0.neon\\\",\" \\\n
      \    \"\\\"http_port\\\":9898,\\\"port\\\":6400,\" \\\n     \"\\\"availability_zone_id\\\":\\\"se-ume\\\"}\"
      > /config/metadata.json\n\n# Copy pageserver.toml from configmap\ncp /configmap/pageserver.toml
      /config/pageserver.toml\n\t\t\t\t\t\t"
    command:
    - /bin/sh
    - -c
    image: busybox:latest
    name: setup-config
    resources: {}
    volumeMounts:
    - mountPath: /configmap
      name: pageserver-config
    - mountPath: /config
      name: config
  securityContext:
    fsGroup: 1000
    runAsGroup: 1000
    runAsUser: 1000
  volumes:
  - name: pageserver-storage
    persistentVolumeClaim:
      claimName: test-cluster-pageserver-0
  - configMap:
      name: test-cluster-pageserver-0
    name: pageserver-config
  - emptyDir: {}
    name: config
status: {}
